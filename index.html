<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Title -->
    <title>Divyodayam Foundation</title>

    <!-- SEO Description -->
    <meta name="description" content="Divyodayam Foundation is dedicated to social development, community support, and impactful initiatives. Our website is currently under maintenance. Please visit again soon.">

    <!-- Allow Indexing -->
    <meta name="robots" content="index, follow">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://divyodayam.com/">

    <!-- Open Graph (For Social Sharing) -->
    <meta property="og:title" content="Divyodayam Foundation">
    <meta property="og:description" content="Official website of Divyodayam Foundation. Currently under maintenance.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="divyodayam">
    <meta property="og:image" content="https://divyodayam.com/foundationlogo.png">

    <!-- Favicon -->
    <link rel="icon" href="foundationlogo.png" type="image/png">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
            flex-direction: column;
        }
        .container {
            opacity: 0;
            animation: fadeIn 2s forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 90%;
        }
        .gear {
            font-size: 100px;
            animation: spin 3s linear infinite;
        }
        .logo {
            width: 250px;
            max-width: 80%;
            margin-bottom: 20px;
        }
        h1, p {
            max-width: 90%;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .fade-in-text {
            opacity: 0;
            animation: textFadeIn 3s forwards 1s;
        }
        @keyframes textFadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="foundationlogo.png" alt="Divyodayam Foundation Logo" class="logo">
        <div class="gear">⚙️</div>

        <h1 class="fade-in-text">Divyodayam Foundation</h1>

        <p class="fade-in-text">
            Divyodayam Foundation works towards community development, education support, and impactful social initiatives.
            Our website is currently under maintenance as we prepare to launch improved services and information.
        </p>

        <p class="fade-in-text">
            For inquiries, please contact us at info@divyodayam.com
        </p>
    </div>
</body>
</html>
